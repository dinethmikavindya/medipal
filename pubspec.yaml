name: medipal1
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_hooks: ^0.20.5
  hooks_riverpod: ^2.6.1
  go_router: ^13.2.5
  get_it: ^7.7.0
  intl: ^0.18.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  google_mlkit_text_recognition: ^0.15.0
  tflite_flutter: ^0.12.1
  camera: ^0.11.3
  image_picker: ^1.0.7
  fl_chart: ^0.65.0
  flutter_local_notifications: ^19.5.0
  workmanager: ^0.9.0+3
  pdf: ^3.10.8
  printing: ^5.14.2
  share_plus: ^12.0.1
  firebase_core: ^3.4.1
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.3.4
  file_picker: ^8.0.0
  pdfx: ^2.6.0
  cupertino_icons: ^1.0.8
  video_player: ^2.10.1
  chewie: ^1.7.1
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/videos/backgroundvid.mp4
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/fonts/Montserrat-Black.ttf
          weight: 900